# ============================================================================
# Purpose: Configuration Properties File
# This file contains all configuration parameters for the test framework
# including browser settings, URLs, timeouts, and data source configurations
# ============================================================================

# ============================================================================
# Browser Configuration
# ============================================================================
# Supported browsers: chrome, firefox, edge
browser=chrome

# Browser window size
window.maximize=true

# Headless mode (true/false)
headless.mode=false

# ============================================================================
# Application URLs
# ============================================================================
# Base URL for SauceDemo application
base.url=https://www.saucedemo.com

# ============================================================================
# Timeout Configuration (in seconds)
# ============================================================================
# Implicit wait timeout
implicit.wait=10

# Explicit wait timeout
explicit.wait=20

# Page load timeout
page.load.timeout=30

# Script timeout
script.timeout=30

# ============================================================================
# Screenshot Configuration
# ============================================================================
# Take screenshot on test failure
screenshot.on.failure=true

# Screenshot directory
screenshot.directory=target/screenshots

# ============================================================================
# Excel Data Source Configuration
# ============================================================================
# Path to Excel test data file
excel.file.path=src/test/resources/testdata/testdata.xlsx

# Sheet names
excel.sheet.login=LoginData
excel.sheet.product=ProductData
excel.sheet.checkout=CheckoutData

# ============================================================================
# Database Configuration (H2 Embedded Database)
# ============================================================================
# Database URL (embedded mode)
db.url=jdbc:h2:./testdb/saucedemo;AUTO_SERVER=TRUE

# Database credentials
db.username=sa
db.password=

# Database driver
db.driver=org.h2.Driver

# Initialize database on startup
db.initialize=true

# ============================================================================
# Redis Configuration
# ============================================================================
# Redis server host
redis.host=localhost

# Redis server port
redis.port=6379

# Redis connection timeout (milliseconds)
redis.timeout=2000

# Redis password (leave empty if no password)
redis.password=

# Enable Redis (set to false if Redis server is not available)
redis.enabled=true

# ============================================================================
# Allure Reporting Configuration
# ============================================================================
# Allure results directory
allure.results.directory=target/allure-results

# ============================================================================
# Test Data Configuration
# ============================================================================
# Valid test user credentials
test.user.standard=standard_user
test.user.locked=locked_out_user
test.user.problem=problem_user
test.user.performance=performance_glitch_user

# Common password for all users
test.password=secret_sauce

# ============================================================================
# Logging Configuration
# ============================================================================
# Log level (TRACE, DEBUG, INFO, WARN, ERROR)
log.level=INFO
